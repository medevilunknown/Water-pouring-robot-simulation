# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 20  # Hz (Reduced from 100 for stability on Mac/Docker)
    
    # Auto-start controllers so they're ready immediately
    startup_controllers:
      - joint_state_broadcaster
      - arm_controller
      - gripper_controller

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
gripper_controller:
  ros__parameters:
    joints:
      - gripper
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity